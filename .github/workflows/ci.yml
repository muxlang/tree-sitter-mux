name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  grammar:
    name: Grammar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify vendored syntax-matrix.json matches canonical
        run: |
          set -euo pipefail
          curl --proto '=https' -fsSL https://raw.githubusercontent.com/muxlang/mux-syntax-highlighting/main/shared/syntax-matrix.json -o /tmp/canonical-syntax-matrix.json
          if ! diff -u /tmp/canonical-syntax-matrix.json ./syntax-matrix.json; then
            echo "::error::Vendored syntax-matrix.json has drifted from canonical shared/syntax-matrix.json in muxlang/mux-syntax-highlighting."
            echo "Re-sync it with: ./scripts/sync-matrix.sh (then commit the updated syntax-matrix.json)."
            exit 1
          fi
      - run: npm install -g tree-sitter-cli@0.26.8
      - name: Generate parser
        run: tree-sitter generate grammar.js
      - name: Corpus tests
        run: tree-sitter test

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clone for better analysis relevancy
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # The free SonarCloud plan locks every project to the built-in "Sonar way"
      # gate, which only fails on rating/coverage thresholds and lets new issues
      # (e.g. a single code smell) through. Enforce "zero new issues" ourselves:
      # the scan above waits for analysis (sonar.qualitygate.wait), so the count
      # is queryable here.
      - name: Fail on new SonarCloud issues
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          api="https://sonarcloud.io/api/measures/component?component=muxlang_tree-sitter-mux&pullRequest=${PR_NUMBER}&metricKeys=new_violations"
          # The measures endpoint can briefly lag the analysis even after the
          # scan reports done, so retry. new_violations is a new-code metric:
          # the count lives under period.value (or periods[].value on older
          # responses). Treat a genuinely absent measure as a failure, not a
          # clean pass, so an unverified analysis never slips through.
          count=""
          for attempt in 1 2 3 4 5; do
            measure=$(curl -sf -u "$SONAR_TOKEN:" "$api") || { sleep 5; continue; }
            count=$(printf '%s' "$measure" | jq -r '(.component.measures[]? | select(.metric == "new_violations")) as $m | ($m.period.value // $m.periods[0].value // $m.value // empty)')
            [ -n "$count" ] && break
            sleep 5
          done
          if [ -z "$count" ]; then
            echo "::error::Could not read new_violations for PR #${PR_NUMBER} from SonarCloud after retries."
            exit 1
          fi
          echo "New SonarCloud issues on PR #${PR_NUMBER}: ${count}"
          if [ "$count" -gt 0 ]; then
            echo "::error::${count} new SonarCloud issue(s) introduced on this PR. See https://sonarcloud.io/project/issues?id=muxlang_tree-sitter-mux&pullRequest=${PR_NUMBER}&resolved=false&inNewCodePeriod=true"
            exit 1
          fi
