name: Bug report
description: Report a parse error, crash, or incorrect highlight query
labels: ["needs triage"]
assignees: ["DerekCorniello"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: checkboxes
    id: editors
    attributes:
      label: Affected editor(s)
      options:
        - label: Neovim (nvim-treesitter)
        - label: Helix
        - label: Emacs
        - label: Other (say which in the description)
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1. Code sample:
        2. Command or action:
        3. Actual result:
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tree-sitter-cli version
